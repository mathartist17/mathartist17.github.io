remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
title: Mathartist17's homepage
description: Bookmark this to keep an eye on my project updates! Write to me at 25f1002053@ds.study.iitm.ac.in

# Site Settings
locale: "en-US"
title: "mathartist17 Blog"
url: "https://github.io"
baseurl: "" # Leave empty if your site is at the root domain

# Defaults for layouts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"

# Search Settings
search: true
search_provider: "lunr" # This is the default high-performance engine

# Author Profile Settings
author:
  name   : "mathartist17"
  bio    : "Software Developer, blogger, and tech enthusiast."
  email  : "25f1002053@ds.study.iitm.ac.in"
  location: "Chennai, India"
